<p>Hello {{ name }}</p>

<p class="form-label fw-bold">Users:</p>
<ul class="list-group d-flex flex-column gap-2">
  @for (user of users; track user.id) {
    <li class="form-control d-flex justify-content-between list-group-item">{{ user.name }} - {{ user.age }}
        <button class="btn btn-danger" (click)="onDeleteUser(user)">Delete</button> 
    </li>
  }
</ul>
